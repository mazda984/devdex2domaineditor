<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main id="app">
    <div class="panel">
      <div class="brand">devdex</div>
      <div class="row">
        <button id="go" aria-label="Site Oluştur">Site Oluştur</button>
      </div>

      <div class="options">
        <label><input type="checkbox" value=".com" checked /> .com</label>
        <label><input type="checkbox" value=".net" /> .net</label>
        <label><input type="checkbox" value=".org" /> .org</label>
        <label><input type="checkbox" value=".xyz" /> .xyz</label>
        <label><input type="checkbox" value=".dev" /> .dev</label>
        <label><input type="checkbox" value=".site" /> .site</label>
      </div>

      <div id="suggestions" class="list" aria-live="polite"></div>

      <div class="footer">
        <small>Kontrol Cloudflare DNS üzerinden yapılır. Gerçek kayıt için önerilen bağlantıya gidin.</small>
      </div>
    </div>
  </main>

  <!-- In-app Domain Selection Modal -->
  <div id="domainModal" class="modal" aria-hidden="true">
    <div class="modal-content">
      <div class="modal-header">
        <strong>Domain Seç ve Oluştur</strong>
        <button id="closeDomain" class="btn copy">Kapat</button>
      </div>
      <div class="options" style="margin-top:6px">
        <label><input type="checkbox" value=".com" checked /> .com</label>
        <label><input type="checkbox" value=".net" /> .net</label>
        <label><input type="checkbox" value=".org" /> .org</label>
        <label><input type="checkbox" value=".xyz" /> .xyz</label>
        <label><input type="checkbox" value=".dev" /> .dev</label>
        <label><input type="checkbox" value=".site" /> .site</label>
      </div>
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:10px">
        <button id="createDomainBtn" class="btn register">Oluştur</button>
      </div>
      <div class="note" style="margin-top:8px">Seçilen uzantılardan rastgele domain oluşturulur ve Dashboard açılır.</div>
    </div>
  </div>

  <!-- Dashboard Modal showing created URL details -->
  <div id="dashboardModal" class="modal" aria-hidden="true">
    <div class="modal-content">
      <div class="modal-header">
        <strong>Dashboard</strong>
        <button id="closeDashboard" class="btn copy">Kapat</button>
      </div>
      <div id="dashBody" style="display:flex;flex-direction:column;gap:8px;padding-top:6px">
        <div style="font-weight:700" id="dashUrl">https://example.com</div>
        <div style="color:var(--muted);font-size:13px" id="dashNote">Domain oluşturuldu ve kalıcı önizleme hazır.</div>
        <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:6px">
          <button id="dashCopy" class="btn copy">Kopyala</button>
          <button id="dashEdit" class="btn copy">Siteyi Düzenle</button>
          <button id="dashOpen" class="btn register">Önizle</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Simple editor modal (hidden by default) -->
  <div id="editorModal" class="modal" aria-hidden="true">
    <div class="modal-content">
      <div class="modal-header">
        <strong>Siteyi Düzenle</strong>
        <button id="closeEditor" class="btn copy">Kapat</button>
      </div>
      <textarea id="editorArea" placeholder="HTML içeriğini buraya yazın"></textarea>
      <div class="modal-actions">
        <button id="previewBtn" class="btn copy">Önizle</button>
        <button id="openBtn" class="btn register">Yeni Sekmede Aç</button>
      </div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
